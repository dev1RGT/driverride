<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VynixRide — Driver</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
:root {
  --ink: #0A0A12;
  --bg: #0F1117;
  --card: #161B26;
  --card2: #1C2235;
  --border: #252D42;
  --muted: #5A6480;
  --blue: #1A3BFF;
  --blue2: #4A6CFF;
  --green: #00D97E;
  --red: #FF4444;
  --amber: #FFB020;
  --glow: rgba(26,59,255,.25);
  --nav-h: 68px;
  --sidebar-w: 76px;
  --sidebar-expanded-w: 260px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'Outfit',sans-serif; background:var(--bg); color:#E8ECFF; }

/* ── INIT LOADER ────────────────────────────────── */
.init-loader {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .4s;
}
.init-loader.hide { opacity:0; pointer-events:none; }
.loader-ring {
  width:48px; height:48px; border:4px solid var(--border);
  border-top-color:var(--blue); border-radius:50%;
  animation:spin .8s linear infinite; margin-bottom:16px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── SHELL ──────────────────────────────────────── */
.shell { display:flex; height:100vh; width:100vw; overflow:hidden; }

/* ── SIDEBAR ────────────────────────────────────── */
.sidebar {
  display:none; width:var(--sidebar-w); background:var(--card);
  border-right:1px solid var(--border);
  flex-direction:column; padding:24px 12px; z-index:200; flex-shrink:0;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  overflow:hidden; white-space:nowrap;
}
@media(min-width:900px){ .sidebar { display:flex; } }
.sidebar:hover { width:var(--sidebar-expanded-w); padding:24px 18px; box-shadow:10px 0 40px rgba(0,0,0,0.4); }

.s-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; padding-left:4px; min-width:220px; }
.s-logo-mark {
  width:38px; height:38px; background:var(--blue); border-radius:11px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; color:#fff;
  box-shadow:0 4px 14px var(--glow);
}
.s-logo-txt { opacity:0; transition:opacity .2s; font-size:16px; font-weight:900; }
.sidebar:hover .s-logo-txt { opacity:1; }

.snl {
  display:flex; align-items:center; gap:14px; padding:12px 10px; border-radius:11px;
  color:var(--muted); cursor:pointer; transition:.15s; margin-bottom:3px; min-width:224px;
}
.snl.act { background:rgba(26,59,255,.15); color:var(--blue2); }
.s-ntxt { opacity:0; transition:opacity .2s; font-size:14px; font-weight:600; }
.sidebar:hover .s-ntxt { opacity:1; }

.s-spacer { flex:1; }
.s-status-row {
  display:flex; align-items:center; gap:12px; padding:10px 10px;
  background:rgba(0,217,126,.08); border:1px solid rgba(0,217,126,.18);
  border-radius:11px; margin-bottom:10px; cursor:pointer; min-width:224px; transition:.2s;
}
.s-status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.s-status-dot.off { background: var(--muted); }
.s-status-txt { opacity:0; transition:opacity .2s; font-size:13px; font-weight:700; color:var(--green); }
.sidebar:hover .s-status-txt { opacity:1; }

/* ── MAIN ───────────────────────────────────────── */
.main { 
  flex:1; height:100vh; overflow:hidden; position:relative; 
  display:flex; flex-direction:column; z-index:10;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── MODERN STATUS PANEL ────────────────────────── */
.map-overlay-panel {
  position:fixed; left:0; right:0; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  background:rgba(22, 27, 38, 0.94); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border); padding:16px 20px 22px;
  z-index:150; display:flex; flex-direction:column; gap:14px;
  border-radius: 28px 28px 0 0;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
  transform: translateY(110%); 
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.map-overlay-panel.show-panel { transform: translateY(0); }

@media(min-width:900px) {
  .map-overlay-panel {
    left: calc(var(--sidebar-w) + 20px); 
    right: auto; bottom: 20px; top: 20px; width: 380px;
    border: 1px solid var(--border); border-radius: 24px;
  }
  /* PANEL SHIFTS WHEN SIDEBAR IS HOVERED */
  .sidebar:hover ~ .main .map-overlay-panel {
    left: calc(var(--sidebar-expanded-w) + 20px);
  }
}

.panel-header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 4px; }
.sheet-handle { width:40px; height:5px; background:var(--border); border-radius:10px; }
.btn-close-panel {
  position: absolute; right: 0; top: 0; width: 32px; height: 32px;
  background: var(--card2); border: 1px solid var(--border); border-radius: 50%;
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; transition: .2s;
}
.btn-close-panel:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* Trigger FAB when closed */
.panel-trigger {
  position: fixed; bottom: calc(var(--nav-h) + 24px); right: 24px;
  width: 60px; height: 60px; background: var(--blue); border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  color: #fff; box-shadow: 0 8px 30px var(--glow); cursor: pointer; z-index: 140;
}
.panel-trigger.show { display: flex; }

.status-hero { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.sh-status-val { font-size:22px; font-weight:900; color:var(--green); }
.sh-status-val.off { color:var(--muted); }
.toggle-pill { position:relative; width:68px; height:36px; cursor:pointer; background:var(--border); border-radius:18px; transition:0.3s; border:none; }
.toggle-pill.on { background:var(--green); }
.toggle-pill::after { content:''; position:absolute; top:4px; left:4px; width:28px; height:28px; border-radius:50%; background:#fff; transition:0.3s; }
.toggle-pill.on::after { transform:translateX(32px); }

.stat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.stat-card { background:var(--card2); border:1px solid var(--border); border-radius:13px; padding:13px 14px; }
.sc-lbl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:5px; }
.sc-val { font-size:20px; font-weight:900; color:#E8ECFF; }

.ride-req-list { display:flex; flex-direction:column; gap:10px; max-height:280px; overflow-y:auto; }
@media(min-width:900px) { .ride-req-list { max-height:none; flex:1; } }

/* ── PAGES ──────────────────────────────────────── */
.page { flex:1; overflow-y:auto; display:none; flex-direction:column; }
.page.show { display:flex; }
#page-map { padding:0; position:relative; overflow:hidden; }
#driverMap { width:100%; height:100%; }

.topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 0; flex-shrink:0; }
@media(min-width:900px){ .topbar { display:none; } }

.bnav {
  position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
  background:rgba(22,27,38,.97); backdrop-filter:blur(16px); border-top:1px solid var(--border);
  display:flex; justify-content:space-around; align-items:flex-start; padding-top:10px; z-index:100;
}
@media(min-width:900px){ .bnav { display:none; } }
.bni { display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:10px; font-weight:600; cursor:pointer; }
.bni.act { color:var(--blue2); }

.toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:#E8ECFF; color:var(--ink); padding:12px 24px; border-radius:30px; font-size:13px; font-weight:700; opacity:0; transition:.3s; z-index:1000; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="init-loader" id="initLoader">
  <div class="loader-ring"></div>
  <div class="loader-brand" style="font-weight:900; color:var(--blue)">VynixRide</div>
</div>

<div class="toast" id="toast"></div>

<div class="panel-trigger" id="panelTrigger" onclick="toggleStatusPanel(true)">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</div>

<div class="shell">
  <aside class="sidebar" id="mainSidebar">
    <div class="s-logo">
      <div class="s-logo-mark">VX</div>
      <div class="s-logo-txt">VynixRide</div>
    </div>
    <div class="snl act" onclick="switchPage('map')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      <span class="s-ntxt">Live Rides</span>
    </div>
    <div class="snl" onclick="switchPage('earnings')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span class="s-ntxt">Earnings</span>
    </div>
    <div class="s-spacer"></div>
    <div class="s-status-row" onclick="toggleOnline()">
      <div class="s-status-dot" id="sidebarDot"></div>
      <span class="s-status-txt" id="sidebarStatusTxt">Offline</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="tb-logo"><div class="s-logo-mark" style="width:34px; height:34px;">VX</div></div>
      <div class="sh-status-val" style="font-size:14px; color:var(--muted)" id="mobileStatus">Offline</div>
    </div>

    <div class="page show" id="page-map">
      <div id="driverMap"></div>
    </div>

    <div class="page" id="page-earnings" style="padding:40px;">
       <h1 style="font-size:32px; font-weight:900; margin-bottom:8px;">Earnings</h1>
       <p style="color:var(--muted)">Your financial summary will appear here.</p>
    </div>

    <div class="map-overlay-panel show-panel" id="mapPanel">
      <div class="panel-header">
        <div class="sheet-handle"></div>
        <div class="btn-close-panel" onclick="toggleStatusPanel(false)">&times;</div>
      </div>
      
      <div class="status-hero">
        <div class="sh-left">
          <div style="font-size:10px; color:var(--muted); font-weight:800; letter-spacing:1px; margin-bottom:2px; text-transform:uppercase;">Status</div>
          <div class="sh-status-val off" id="statusVal">Offline</div>
        </div>
        <button class="toggle-pill" id="bigToggle" onclick="toggleOnline()"></button>
      </div>

      <div class="stat-row">
        <div class="stat-card"><div class="sc-lbl">Today</div><div class="sc-val">0</div></div>
        <div class="stat-card"><div class="sc-lbl">Earned</div><div class="sc-val">R0</div></div>
        <div class="stat-card"><div class="sc-lbl">Online</div><div class="sc-val">0h</div></div>
      </div>

      <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-top:10px;">Requests</div>
      <div class="ride-req-list" id="rideReqList">
        <div style="text-align:center; padding:30px; color:var(--muted); font-size:13px;">Go online to see ride requests</div>
      </div>
    </div>
  </div>

  <nav class="bnav">
    <div class="bni act" onclick="switchPage('map')">Rides</div>
    <div class="bni" onclick="switchPage('earnings')">Earnings</div>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain: "fire-b-a8878.firebaseapp.com",
  databaseURL: "https://fire-b-a8878.firebaseio.com",
  projectId: "fire-b-a8878"
});
const db = getDatabase(app);

let isOnline = false;

window.onload = () => {
  document.getElementById('initLoader').classList.add('hide');
  initMap();
};

window.toggleStatusPanel = (show) => {
  const panel = document.getElementById('mapPanel');
  const trigger = document.getElementById('panelTrigger');
  if(show) {
    panel.classList.add('show-panel');
    trigger.classList.remove('show');
  } else {
    panel.classList.remove('show-panel');
    trigger.classList.add('show');
  }
};

let driverMap;
function initMap() {
  mapboxgl.accessToken = 'pk.eyJ1Ijoia2F0bGVnb3BoYXNoYSIsImEiOiJjbTlpOTdzbmYwMGNsMmpzYWJtZzN4d3pqIn0.Zt-aSMEoahrV3zkiVVHbOw';
  driverMap = new mapboxgl.Map({
    container: 'driverMap',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [28.99, -24.19], zoom: 14, attributionControl: false
  });
}

window.toggleOnline = function() {
  isOnline = !isOnline;
  const btn = document.getElementById('bigToggle');
  const sv = document.getElementById('statusVal');
  const sd = document.getElementById('sidebarDot');
  const st = document.getElementById('sidebarStatusTxt');
  const ms = document.getElementById('mobileStatus');

  btn.classList.toggle('on', isOnline);
  sv.textContent = isOnline ? 'Online' : 'Offline';
  sv.classList.toggle('off', !isOnline);
  sd.classList.toggle('off', !isOnline);
  st.textContent = isOnline ? 'Online' : 'Offline';
  ms.textContent = isOnline ? 'Online' : 'Offline';
  ms.style.color = isOnline ? 'var(--green)' : 'var(--muted)';
  
  showToast(isOnline ? "You are now Online 🟢" : "You are now Offline ⚫");
};

window.switchPage = (name) => {
  document.getElementById('page-map').classList.toggle('show', name === 'map');
  document.getElementById('page-earnings').classList.toggle('show', name === 'earnings');
  if(name === 'map') setTimeout(() => driverMap.resize(), 100);
};

window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
};
</script>
</body>
</html>
